site_name: Detect & Track Drones in TAK - SiKW00F to TAK Gateway
site_url: https://sikw00fcot.rtfd.io/
repo_url: https://github.com/snstac/sikw00fcot/
site_description: Detect and track drones in the Team Awareness Kit (TAK) from their SiK radio telemetry links, via SiKW00F & PyTAK.
site_author: Sensors & Signals LLC <oss@undef.net>
copyright: Copyright Sensors & Signals LLC https://www.snstac.com

theme:
  name: material
  highlightjs: true
  features:
    - content.code.copy
    - content.code.select
    - content.code.annotate

plugins:
  - include-markdown:
      opening_tag: "{!"
      closing_tag: "!}"
  - search
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx

markdown_extensions:
  - markdown_include.include:
      base_path: .
  - admonition
  - toc:
      permalink: True
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Changelog: changelog.md
