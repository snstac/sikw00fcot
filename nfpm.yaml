# nfpm packaging (snstac house style: deb + rpm for cockpit/TAK plugins).
# Build: nfpm package -p deb  and  nfpm package -p rpm
name: sikw00fcot
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Sensors & Signals LLC <gba@snstac.com>
description: |
  SiKW00F drone MAVLink telemetry to Cursor-on-Target (CoT) gateway.
  Consumes MAVLink eavesdropped from a drone's SiK telemetry link and
  forwards position/track CoT to TAK Server / ATAK / WinTAK via PyTAK.
vendor: Sensors & Signals LLC
homepage: https://github.com/snstac
license: Apache-2.0

depends:
  - python3
  - python3-pip

contents:
  - src: ./config/sikw00fcot.service
    dst: /lib/systemd/system/sikw00fcot.service
  - src: ./config/sikw00fcot.config.example
    dst: /etc/sikw00fcot/config.ini.example
  - src: ./config/sikw00fcot.config.example
    dst: /etc/default/sikw00fcot
    type: config|noreplace

scripts:
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh
