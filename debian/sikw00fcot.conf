# sikw00fcot.conf from https://github.com/snstac/sikw00fcot
#
# Debian specific runtime configuration for sikw00fcot, installed to
# /etc/default/sikw00fcot. This configures the MAVLink -> CoT gateway, which
# consumes drone MAVLink (eavesdropped + fanned out by SiKW00F) over UDP and
# forwards position/track CoT to TAK.
